# Docker 내부 DNS 서버 — upstream 호스트명을 동적으로 재해석
# 백엔드/프론트엔드 컨테이너가 재시작돼 IP가 바뀌어도 nginx가 자동 갱신
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # 요청 크기 제한 (업로드 파일)
    client_max_body_size 10m;

    # 보안 헤더 (HTTP에서 적용 가능한 것만)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # proxy_pass에 변수를 사용하면 resolver가 활성화돼 DNS 재해석이 적용됨
    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    # WebSocket (로컬 에이전트 연결) — /ws/ 경로 우선 처리
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # 1시간 — WebSocket 연결 유지
        proxy_send_timeout 3600s;
    }

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) 지원 — 토론 실시간 스트림
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # 업로드 파일 서빙
    location /uploads/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # /metrics 접근 차단 (외부 노출 방지)
    location /metrics {
        deny all;
    }

    # 숨겨야 할 경로 차단
    location ~ /\. {
        deny all;
    }

    # Frontend (Next.js) — 나머지 모든 경로
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
