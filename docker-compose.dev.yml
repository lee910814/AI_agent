# 개발 서버 전용 Compose
# 단독 실행: docker compose -p chatbot-dev -f docker-compose.dev.yml up -d
# 싱글 EC2에서 prod와 공존 시 nginx가 8080 포트를 사용함

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chatbot-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_dev}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:5433:5432"    # prod(5432)와 포트 충돌 방지
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chatbot-dev-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"    # prod(6379)와 포트 충돌 방지
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      # 개발 빌드: --no-cache 없이 레이어 캐시 최대 활용
    container_name: chatbot-dev-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_dev:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: chatbot-dev-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_URL: http://chatbot-dev-backend:8000
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: chatbot-dev-nginx
    restart: unless-stopped
    ports:
      - "8080:80"    # 싱글 EC2에서 prod(80)와 공존. 전용 dev EC2라면 80으로 변경
    volumes:
      - ./infra/nginx/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata_dev:
  redisdata_dev:
  uploads_dev:
