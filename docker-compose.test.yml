services:
  test-db:
    image: pgvector/pgvector:pg16
    container_name: chatbot-test-db
    environment:
      POSTGRES_DB: chatbot_test
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_test_pw
    ports:
      - "127.0.0.1:5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  test-redis:
    image: redis:7-alpine
    container_name: chatbot-test-redis
    command: >
      redis-server
      --requirepass test_redis_pw
      --save ""
      --appendonly no
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_redis_pw", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
